<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores para ti 💛</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #140028, #000);
    overflow: hidden;
    font-family: Arial;
    text-align: center;
}

/* TEXTO GRANDE */
h1 {
    color: #ffeb3b;
    margin-top: 3vh;
    font-size: 6vw;
    text-shadow: 0 0 20px #ffeb3b;
}

button {
    margin-top: 2vh;
    padding: 2vh 5vw;
    font-size: 4.5vw;
    border-radius: 12px;
    border: none;
    background: #ffeb3b;
    cursor: pointer;
}

/* RAMO CENTRADO */
#campo {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -30%);
    width: 100%;
    height: 80%;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 1vw;
}

/* FLORES GIGANTES */
svg {
    width: 35vw;
    height: auto;
}

/* TALLO */
.tallo {
    stroke-dasharray: 500;
    stroke-dashoffset: 500;
    animation: crecer 2.5s ease forwards;
}

@keyframes crecer {
    to { stroke-dashoffset: 0; }
}

/* FLOR */
.flor {
    transform-origin: center;
    transform: scale(0);
    animation: florecer 1s ease forwards;
}

@keyframes florecer {
    to { transform: scale(1); }
}

/* VIENTO MÁS NATURAL */
.viento {
    animation: viento 4s ease-in-out infinite alternate;
    transform-origin: bottom center;
}

@keyframes viento {
    0% { transform: rotate(-3deg); }
    50% { transform: rotate(2deg); }
    100% { transform: rotate(-2deg); }
}

/* HOJAS */
.hoja {
    opacity: 0;
    animation: hojas 1s ease forwards;
}

@keyframes hojas {
    to { opacity: 1; }
}

/* BRILLOS ✨ */
.brillo {
    position: absolute;
    width: 6px;
    height: 6px;
    background: #fff59d;
    border-radius: 50%;
    opacity: 0;
    animation: brillar 2s infinite;
}

@keyframes brillar {
    0% { opacity: 0; transform: scale(0); }
    50% { opacity: 1; transform: scale(1.5); }
    100% { opacity: 0; transform: scale(0); }
}

/* MENSAJE */
#mensaje {
    position: absolute;
    bottom: 10%;
    width: 100%;
    font-size: 5vw;
    color: #fff;
    opacity: 0;
    animation: aparecer 3s forwards;
    animation-delay: 5s;
}

@keyframes aparecer {
    to { opacity: 1; }
}
</style>
</head>

<body>

<h1>🌻 Flores para ti 💛</h1>
<button onclick="iniciar()">Dale click 💛</button>

<div id="campo"></div>
<div id="mensaje">Para ti 💛 con todo mi cariño ✨</div>

<!-- AUDIO -->
<audio id="musica" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
</audio>

<script>
const campo = document.getElementById("campo");

function crearFlor(config, delay) {

    let {curva, altura} = config;

    let svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("viewBox", "0 0 200 350");
    svg.classList.add("viento");

    // TALLO
    let tallo = document.createElementNS("http://www.w3.org/2000/svg", "path");
    tallo.setAttribute("d", `M100 350 Q${100 + curva} 200 100 ${altura}`);
    tallo.setAttribute("stroke", "#2e7d32");
    tallo.setAttribute("stroke-width", 5);
    tallo.setAttribute("fill", "none");
    tallo.classList.add("tallo");
    tallo.style.animationDelay = delay + "s";
    svg.appendChild(tallo);

    // HOJAS
    let hojas = [
        [95, 300, -30],
        [105, 260, 30],
        [95, 220, -25],
    ];

    hojas.forEach((p, i) => {
        let hoja = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
        hoja.setAttribute("cx", p[0]);
        hoja.setAttribute("cy", p[1]);
        hoja.setAttribute("rx", 14);
        hoja.setAttribute("ry", 8);
        hoja.setAttribute("fill", "#43a047");
        hoja.setAttribute("transform", `rotate(${p[2]} ${p[0]} ${p[1]})`);
        hoja.classList.add("hoja");
        hoja.style.animationDelay = (delay + 1) + "s";
        svg.appendChild(hoja);
    });

    // CENTRO
    let centro = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    centro.setAttribute("cx", "100");
    centro.setAttribute("cy", altura);
    centro.setAttribute("r", 18);
    centro.setAttribute("fill", "#5d4037");
    svg.appendChild(centro);

    // PÉTALOS
    let grupo = document.createElementNS("http://www.w3.org/2000/svg", "g");
    grupo.classList.add("flor");
    grupo.style.animationDelay = (delay + 1.5) + "s";

    for (let i = 0; i < 16; i++) {
        let petalo = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
        petalo.setAttribute("cx", "100");
        petalo.setAttribute("cy", altura - 20);
        petalo.setAttribute("rx", 16);
        petalo.setAttribute("ry", 40);
        petalo.setAttribute("fill", "#fdd835");
        petalo.setAttribute("transform", `rotate(${i * 22} 100 ${altura})`);
        grupo.appendChild(petalo);
    }

    svg.appendChild(grupo);
    campo.appendChild(svg);
}

function iniciar() {
    campo.innerHTML = "";

    document.getElementById("musica").play();

    crearFlor({curva:-30, altura:160}, 0);
    crearFlor({curva:-10, altura:140}, 0.5);
    crearFlor({curva:0, altura:120}, 1);
    crearFlor({curva:10, altura:140}, 1.5);
    crearFlor({curva:30, altura:160}, 2);

    // BRILLOS
    for (let i = 0; i < 20; i++) {
        let b = document.createElement("div");
        b.className = "brillo";
        b.style.left = Math.random() * 100 + "%";
        b.style.top = (40 + Math.random() * 40) + "%";
        b.style.animationDelay = Math.random() * 3 + "s";
        document.body.appendChild(b);
    }
}
</script>

</body>
</html>
