<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores para ti 💛</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #140028, #000);
    overflow: hidden;
    font-family: Arial;
}

h1 {
    text-align: center;
    color: #ffeb3b;
    margin-top: 30px;
    text-shadow: 0 0 20px #ffeb3b, 0 0 40px #ffc107;
}

/* CAMPO */
#campo {
    position: absolute;
    bottom: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 20px;
}

/* TALLO ANIMADO */
.tallo {
    stroke-dasharray: 300;
    stroke-dashoffset: 300;
    animation: crecer 3s ease forwards;
}

@keyframes crecer {
    to {
        stroke-dashoffset: 0;
    }
}

/* FLOR */
.flor {
    opacity: 0;
    transform: scale(0.5);
    animation: florecer 2s ease forwards;
    animation-delay: 2.5s;
}

@keyframes florecer {
    to {
        opacity: 1;
        transform: scale(1);
    }
}

/* HOJAS */
.hoja {
    opacity: 0;
    animation: aparecerHoja 1s ease forwards;
    animation-delay: 2s;
}

@keyframes aparecerHoja {
    to { opacity: 1; }
}

/* PARTÍCULAS */
.particula {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #ffeb3b;
    border-radius: 50%;
    animation: flotar linear infinite;
}

@keyframes flotar {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-400px); opacity: 0; }
}
</style>
</head>

<body>

<h1>🌻 Flores para ti 💛</h1>
<div id="campo"></div>

<script>
const campo = document.getElementById("campo");

function crearFlor(escala, curva) {

    let svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("width", 120 * escala);
    svg.setAttribute("height", 240 * escala);

    // DEGRADADO
    let defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");

    let grad = document.createElementNS("http://www.w3.org/2000/svg", "radialGradient");
    let id = "grad" + Math.random();
    grad.setAttribute("id", id);

    grad.innerHTML = `
        <stop offset="0%" stop-color="#fff9c4"/>
        <stop offset="100%" stop-color="#fbc02d"/>
    `;

    defs.appendChild(grad);
    svg.appendChild(defs);

    // TALLO
    let tallo = document.createElementNS("http://www.w3.org/2000/svg", "path");
    tallo.setAttribute("d", `M60 240 Q${60 + curva} 150 60 110`);
    tallo.setAttribute("stroke", "#2e7d32");
    tallo.setAttribute("stroke-width", 5 * escala);
    tallo.setAttribute("fill", "none");
    tallo.classList.add("tallo");

    svg.appendChild(tallo);

    // HOJAS
    function hoja(x, y, rot) {
        let h = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
        h.setAttribute("cx", x);
        h.setAttribute("cy", y);
        h.setAttribute("rx", 12 * escala);
        h.setAttribute("ry", 6 * escala);
        h.setAttribute("fill", "#388e3c");
        h.setAttribute("transform", `rotate(${rot} ${x} ${y})`);
        h.classList.add("hoja");
        return h;
    }

    svg.appendChild(hoja(45, 180, -30));
    svg.appendChild(hoja(75, 160, 30));

    // FLOR
    let grupoFlor = document.createElementNS("http://www.w3.org/2000/svg", "g");
    grupoFlor.classList.add("flor");

    for (let i = 0; i < 18; i++) {
        let petalo = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
        petalo.setAttribute("cx", "60");
        petalo.setAttribute("cy", "90");
        petalo.setAttribute("rx", 10 * escala);
        petalo.setAttribute("ry", 30 * escala);
        petalo.setAttribute("fill", `url(#${id})`);
        petalo.setAttribute("transform", `rotate(${i * 20} 60 120)`);
        grupoFlor.appendChild(petalo);
    }

    let centro = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    centro.setAttribute("cx", "60");
    centro.setAttribute("cy", "120");
    centro.setAttribute("r", 18 * escala);
    centro.setAttribute("fill", "#5d4037");

    grupoFlor.appendChild(centro);
    svg.appendChild(grupoFlor);

    campo.appendChild(svg);
}

// RAMO
crearFlor(0.8, -20);
crearFlor(1, -10);
crearFlor(1.3, 0);
crearFlor(1, 10);
crearFlor(0.8, 20);

// ✨ PARTÍCULAS
function crearParticula() {
    let p = document.createElement("div");
    p.className = "particula";
    p.style.left = Math.random() * 100 + "%";
    p.style.bottom = "0px";
    p.style.animationDuration = (4 + Math.random() * 4) + "s";

    document.body.appendChild(p);
    setTimeout(() => p.remove(), 8000);
}

setInterval(crearParticula, 120);
</script>

</body>
</html>
