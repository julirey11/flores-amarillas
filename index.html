<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores para ti 💛</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #1a0033, #000);
    overflow: hidden;
    font-family: Arial;
    color: white;
}

/* TEXTO */
.titulo {
    text-align: center;
    margin-top: 40px;
    font-size: 40px;
    color: #ffeb3b;
    text-shadow: 0 0 20px #ffeb3b, 0 0 40px #ffc107;
}

/* RAMO */
#ramo {
    position: absolute;
    bottom: 0;
    width: 100%;
    display: flex;
    justify-content: center;
}

/* TALLOS */
.tallo {
    width: 6px;
    height: 0;
    background: #2e7d32;
    margin: 0 10px;
    animation: crecer 3s forwards;
}

/* CRECIMIENTO */
@keyframes crecer {
    to { height: 200px; }
}

/* FLOR */
.flor {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: radial-gradient(circle, #5d4037 30%, #fdd835 31%);
    position: relative;
    transform: scale(0);
    animation: aparecer 2s forwards;
    animation-delay: 3s;
}

/* PÉTALOS */
.flor::before {
    content: "";
    position: absolute;
    width: 100px;
    height: 100px;
    background: repeating-conic-gradient(#fdd835 0deg 15deg, transparent 15deg 30deg);
    border-radius: 50%;
    top: -15px;
    left: -15px;
}

/* APARECER */
@keyframes aparecer {
    to { transform: scale(1); }
}

/* BRILLOS */
.brillo {
    position: absolute;
    width: 5px;
    height: 5px;
    background: yellow;
    border-radius: 50%;
    animation: flotar 6s linear infinite;
}

@keyframes flotar {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-300px); opacity: 0; }
}
</style>
</head>

<body>

<div class="titulo">🌻 Flores para ti 💛</div>

<div id="ramo"></div>

<script>
let ramo = document.getElementById("ramo");

// crear ramo centrado
for (let i = 0; i < 7; i++) {
    let cont = document.createElement("div");
    cont.style.display = "flex";
    cont.style.flexDirection = "column";
    cont.style.alignItems = "center";

    let flor = document.createElement("div");
    flor.className = "flor";

    let tallo = document.createElement("div");
    tallo.className = "tallo";

    cont.appendChild(flor);
    cont.appendChild(tallo);

    ramo.appendChild(cont);
}

// brillos
function crearBrillo() {
    let b = document.createElement("div");
    b.className = "brillo";
    b.style.left = Math.random() * 100 + "%";
    b.style.top = "100%";

    document.body.appendChild(b);
    setTimeout(() => b.remove(), 6000);
}

setInterval(crearBrillo, 150);
</script>

</body>
</html>
