<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores para ti 💛</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #140028, #000);
    overflow: hidden;
    font-family: Arial;
    text-align: center;
}

/* TEXO MÁS GRANDE 📱 */
h1 {
    color: #ffeb3b;
    margin-top: 20px;
    font-size: 32px;
    text-shadow: 0 0 20px #ffeb3b;
}

button {
    margin-top: 15px;
    padding: 14px 30px;
    font-size: 20px;
    border-radius: 12px;
    border: none;
    background: #ffeb3b;
    cursor: pointer;
}

/* CAMPO MÁS CENTRADO */
#campo {
    position: absolute;
    top: 20%;
    width: 100%;
    height: 80%;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 2vw;
}

/* TALLO */
.tallo {
    stroke-dasharray: 500;
    stroke-dashoffset: 500;
    animation: crecer 3s ease forwards;
}

@keyframes crecer {
    to { stroke-dashoffset: 0; }
}

/* FLOR DESDE EL CENTRO */
.flor {
    transform-origin: center;
    transform: scale(0);
    animation: florecer 1.5s ease forwards;
    animation-delay: 2.5s;
}

@keyframes florecer {
    to { transform: scale(1); }
}

/* MOVIMIENTO VIENTO 🌬️ */
.viento {
    animation: viento 3s ease-in-out infinite alternate;
    transform-origin: bottom center;
}

@keyframes viento {
    from { transform: rotate(-2deg); }
    to { transform: rotate(2deg); }
}

/* HOJAS MEJORADAS */
.hoja {
    opacity: 0;
    animation: hojas 1.5s ease forwards;
    animation-delay: 2s;
}

@keyframes hojas {
    to { opacity: 1; }
}

/* 📱 RESPONSIVE */
@media (max-width: 600px) {
    h1 { font-size: 28px; }

    svg {
        width: 200px !important;
        height: 350px !important;
    }
}
</style>
</head>

<body>

<h1>🌻 Flores para ti 💛</h1>
<button onclick="crearRamo()">Dale click 💛</button>

<div id="campo"></div>

<script>
const campo = document.getElementById("campo");

function crearFlor(config) {

    let {escala, curva, altura} = config;

    let svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("viewBox", "0 0 200 350");
    svg.style.width = "220px";
    svg.style.height = "360px";
    svg.style.transform = `scale(${escala})`;
    svg.classList.add("viento");

    // TALLO
    let tallo = document.createElementNS("http://www.w3.org/2000/svg", "path");
    tallo.setAttribute("d", `M100 350 Q${100 + curva} 200 100 ${altura}`);
    tallo.setAttribute("stroke", "#2e7d32");
    tallo.setAttribute("stroke-width", 6);
    tallo.setAttribute("fill", "none");
    tallo.classList.add("tallo");
    svg.appendChild(tallo);

    // HOJAS MÁS NATURALES
    let hojasPos = [
        [95, 300, -30],
        [105, 270, 30],
        [95, 240, -25],
        [105, 210, 25],
    ];

    hojasPos.forEach(p => {
        let hoja = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
        hoja.setAttribute("cx", p[0]);
        hoja.setAttribute("cy", p[1]);
        hoja.setAttribute("rx", 18);
        hoja.setAttribute("ry", 10);
        hoja.setAttribute("fill", "#43a047");
        hoja.setAttribute("transform", `rotate(${p[2]} ${p[0]} ${p[1]})`);
        hoja.classList.add("hoja");
        svg.appendChild(hoja);
    });

    // CENTRO (PEGADO AL TALLO)
    let centro = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    centro.setAttribute("cx", "100");
    centro.setAttribute("cy", altura);
    centro.setAttribute("r", 20);
    centro.setAttribute("fill", "#5d4037");
    svg.appendChild(centro);

    // PÉTALOS NACEN DEL CENTRO 🌻
    let grupo = document.createElementNS("http://www.w3.org/2000/svg", "g");
    grupo.classList.add("flor");

    for (let i = 0; i < 18; i++) {
        let petalo = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");

        petalo.setAttribute("cx", "100");
        petalo.setAttribute("cy", altura - 25);
        petalo.setAttribute("rx", 16);
        petalo.setAttribute("ry", 40);
        petalo.setAttribute("fill", "#fdd835");

        petalo.setAttribute("transform", `rotate(${i * 20} 100 ${altura})`);
        grupo.appendChild(petalo);
    }

    svg.appendChild(grupo);
    campo.appendChild(svg);
}

function crearRamo() {
    campo.innerHTML = "";

    crearFlor({escala:1, curva:-30, altura:160});
    crearFlor({escala:1.1, curva:-10, altura:140});
    crearFlor({escala:1.3, curva:0, altura:120}); // centro
    crearFlor({escala:1.1, curva:10, altura:140});
    crearFlor({escala:1, curva:30, altura:160});
}
</script>

</body>
</html>
