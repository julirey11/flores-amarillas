<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores Amarillas 💛</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(#87CEEB, #fff);
        overflow: hidden;
        text-align: center;
    }

    #inicio {
        position: absolute;
        top: 40%;
        width: 100%;
    }

    button {
        padding: 15px 30px;
        font-size: 20px;
        border: none;
        background: gold;
        border-radius: 10px;
        cursor: pointer;
    }

    #mensaje {
        display: none;
        position: absolute;
        top: 20%;
        width: 80%;
        left: 10%;
        font-size: 20px;
    }

    #final {
        display: none;
        position: absolute;
        top: 10%;
        width: 100%;
        font-size: 30px;
        color: orange;
        font-weight: bold;
    }

    .flor {
        position: absolute;
        bottom: -100px;
        font-size: 40px;
        animation: subir 5s forwards;
    }

    @keyframes subir {
        to {
            bottom: 50px;
        }
    }

    .abeja {
        position: absolute;
        font-size: 30px;
        animation: volar 10s linear infinite;
    }

    @keyframes volar {
        0% { left: -50px; top: 50px; }
        50% { top: 100px; }
        100% { left: 100%; top: 60px; }
    }
</style>
</head>
<body>

<div id="inicio">
    <button onclick="iniciar()">Dale click 💛</button>
</div>

<div id="mensaje"></div>

<div id="final">🌼 Feliz día de las flores amarillas 🌼</div>

<script>
function iniciar() {
    document.getElementById("inicio").style.display = "none";

    const texto = `Se que tal vez no es lo mismo pero esta hecho con mucho amor,
    se que he llegado a decepcionarte pero no es mi intención,
    solo quiero darte lo mejor de mí, que cada día sea especial,
    y sé que unas flores virtuales no son lo mismo que unas florecitas reales,
    pero esta animación está hecha con mucho amor para demostrarte mi amor sincero.
    Te amo mucho mi vida 💛`;

    const mensajeDiv = document.getElementById("mensaje");
    mensajeDiv.style.display = "block";
    mensajeDiv.innerText = texto;

    // Tiempo de lectura (10 segundos)
    setTimeout(() => {
        mensajeDiv.style.display = "none";
        mostrarFlores();
    }, 10000);
}

function mostrarFlores() {
    document.getElementById("final").style.display = "block";

    // Crear flores
    for (let i = 0; i < 20; i++) {
        let flor = document.createElement("div");
        flor.className = "flor";
        flor.innerText = Math.random() > 0.5 ? "🌻" : "🌹";
        flor.style.left = Math.random() * 100 + "%";
        document.body.appendChild(flor);
    }

    // Crear abejas
    for (let i = 0; i < 5; i++) {
        let abeja = document.createElement("div");
        abeja.className = "abeja";
        abeja.innerText = "🐝";
        abeja.style.top = (50 + i * 30) + "px";
        document.body.appendChild(abeja);
    }
}
</script>

</body>
</html>
