<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores para ti 💛</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #140028, #000);
    overflow: hidden;
    font-family: Arial;
}

/* TEXTO */
h1 {
    text-align: center;
    color: #ffeb3b;
    margin-top: 30px;
    text-shadow: 0 0 20px #ffeb3b, 0 0 40px #ffc107;
}

/* CAMPO */
#campo {
    position: absolute;
    bottom: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 50px;
}

/* TALLO */
.tallo {
    width: 5px;
    height: 0;
    background: linear-gradient(#1b5e20, #66bb6a);
    animation: crecer 3s ease forwards;
}

@keyframes crecer {
    to { height: 180px; }
}

/* FLOR */
.flor {
    transform: scale(0);
    animation: abrir 2s ease forwards;
    animation-delay: 3s;
}

@keyframes abrir {
    to { transform: scale(1); }
}

/* PARTÍCULAS */
.particula {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #ffeb3b;
    border-radius: 50%;
    animation: flotar 6s linear infinite;
}

@keyframes flotar {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-300px); opacity: 0; }
}
</style>
</head>

<body>

<h1>🌻 Flores para ti 💛</h1>
<div id="campo"></div>

<script>
const campo = document.getElementById("campo");

function crearFlor() {
    let cont = document.createElement("div");
    cont.style.display = "flex";
    cont.style.flexDirection = "column";
    cont.style.alignItems = "center";

    // SVG REALISTA
    let svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("width", "100");
    svg.setAttribute("height", "100");
    svg.classList.add("flor");

    // pétalos suaves tipo girasol real
    for (let i = 0; i < 20; i++) {
        let petalo = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");

        petalo.setAttribute("cx", "50");
        petalo.setAttribute("cy", "25");
        petalo.setAttribute("rx", "10");
        petalo.setAttribute("ry", "28");
        petalo.setAttribute("fill", "#fdd835");

        petalo.setAttribute(
            "transform",
            `rotate(${i * 18} 50 50)`
        );

        petalo.style.opacity = "0";

        // animación de apertura uno por uno
        setTimeout(() => {
            petalo.style.transition = "0.5s";
            petalo.style.opacity = "1";
        }, i * 80);

        svg.appendChild(petalo);
    }

    // centro realista
    let centro = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    centro.setAttribute("cx", "50");
    centro.setAttribute("cy", "50");
    centro.setAttribute("r", "18");
    centro.setAttribute("fill", "#5d4037");

    svg.appendChild(centro);

    // tallo
    let tallo = document.createElement("div");
    tallo.className = "tallo";

    cont.appendChild(svg);
    cont.appendChild(tallo);

    campo.appendChild(cont);
}

// crear flores
for (let i = 0; i < 5; i++) {
    crearFlor();
}

// partículas bonitas
function crearParticula() {
    let p = document.createElement("div");
    p.className = "particula";
    p.style.left = Math.random() * 100 + "%";
    p.style.top = "100%";

    document.body.appendChild(p);
    setTimeout(() => p.remove(), 6000);
}

setInterval(crearParticula, 150);
</script>

</body>
</html>
