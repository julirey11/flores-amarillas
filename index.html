<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores para ti 💛</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #140028, #000);
    overflow: hidden;
    font-family: Arial;
    text-align: center;
}

h1 {
    color: #ffeb3b;
    margin-top: 20px;
    text-shadow: 0 0 20px #ffeb3b;
}

button {
    margin-top: 15px;
    padding: 12px 25px;
    font-size: 18px;
    border-radius: 10px;
    border: none;
    background: #ffeb3b;
    cursor: pointer;
}

/* CAMPO */
#campo {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 85%;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 5vw;
}

/* TALLO CRECE DESDE ABAJO */
.tallo {
    stroke-dasharray: 500;
    stroke-dashoffset: 500;
    animation: crecer 4s ease forwards;
}

@keyframes crecer {
    to { stroke-dashoffset: 0; }
}

/* FLOR CRECE DESDE CENTRO */
.flor {
    transform-origin: center;
    transform: scale(0);
    animation: florecer 3s ease forwards;
    animation-delay: 3.5s;
}

@keyframes florecer {
    to { transform: scale(1); }
}

/* HOJAS */
.hoja {
    opacity: 0;
    animation: hojas 2s ease forwards;
    animation-delay: 2.5s;
}

@keyframes hojas {
    to { opacity: 1; }
}

/* PARTÍCULAS */
.particula {
    position: absolute;
    width: 5px;
    height: 5px;
    background: #ffeb3b;
    border-radius: 50%;
    animation: flotar linear infinite;
}

@keyframes flotar {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-600px); opacity: 0; }
}

/* 📱 RESPONSIVE */
@media (max-width: 600px) {
    svg {
        width: 120px !important;
        height: 260px !important;
    }
}
</style>
</head>

<body>

<h1>🌻 Flores para ti 💛</h1>
<button onclick="crearRamo()">Dale click 💛</button>

<div id="campo"></div>

<script>
const campo = document.getElementById("campo");

function crearFlor(config) {

    let {escala, curva, altura} = config;

    let svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("viewBox", "0 0 200 350");
    svg.style.width = "180px";
    svg.style.height = "320px";
    svg.style.transform = `scale(${escala})`;

    // DEGRADADO
    let defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");
    let grad = document.createElementNS("http://www.w3.org/2000/svg", "radialGradient");
    let id = "g" + Math.random();

    grad.setAttribute("id", id);
    grad.innerHTML = `
        <stop offset="0%" stop-color="#fffde7"/>
        <stop offset="100%" stop-color="#fbc02d"/>
    `;
    defs.appendChild(grad);
    svg.appendChild(defs);

    // TALLO DESDE ABAJO
    let tallo = document.createElementNS("http://www.w3.org/2000/svg", "path");
    tallo.setAttribute("d", `M100 350 Q${100 + curva} 200 100 ${altura}`);
    tallo.setAttribute("stroke", "#2e7d32");
    tallo.setAttribute("stroke-width", 6);
    tallo.setAttribute("fill", "none");
    tallo.classList.add("tallo");

    svg.appendChild(tallo);

    // HOJAS
    let hojasPos = [
        [80, 300, -40],
        [120, 280, 40],
        [80, 260, -30],
        [120, 240, 30],
        [85, 220, -25],
        [115, 200, 25],
    ];

    hojasPos.forEach(p => {
        let hoja = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
        hoja.setAttribute("cx", p[0]);
        hoja.setAttribute("cy", p[1]);
        hoja.setAttribute("rx", 16);
        hoja.setAttribute("ry", 8);
        hoja.setAttribute("fill", "#43a047");
        hoja.setAttribute("transform", `rotate(${p[2]} ${p[0]} ${p[1]})`);
        hoja.classList.add("hoja");
        svg.appendChild(hoja);
    });

    // FLOR (CRECE DESDE CENTRO)
    let grupo = document.createElementNS("http://www.w3.org/2000/svg", "g");
    grupo.setAttribute("transform-origin", "100px " + altura);
    grupo.classList.add("flor");

    for (let i = 0; i < 20; i++) {
        let petalo = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");

        petalo.setAttribute("cx", "100");
        petalo.setAttribute("cy", altura - 20);
        petalo.setAttribute("rx", 14);
        petalo.setAttribute("ry", 38);
        petalo.setAttribute("fill", `url(#${id})`);

        petalo.setAttribute("transform", `rotate(${i * 18} 100 ${altura})`);
        grupo.appendChild(petalo);
    }

    let centro = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    centro.setAttribute("cx", "100");
    centro.setAttribute("cy", altura);
    centro.setAttribute("r", 22);
    centro.setAttribute("fill", "#5d4037");

    grupo.appendChild(centro);
    svg.appendChild(grupo);

    campo.appendChild(svg);
}

function crearRamo() {
    campo.innerHTML = "";

    crearFlor({escala:0.8, curva:-40, altura:170});
    crearFlor({escala:1, curva:-20, altura:150});
    crearFlor({escala:1.3, curva:0, altura:130}); // centro
    crearFlor({escala:1, curva:20, altura:150});
    crearFlor({escala:0.8, curva:40, altura:170});
}

// PARTÍCULAS
function part() {
    let p = document.createElement("div");
    p.className = "particula";
    p.style.left = Math.random() * 100 + "%";
    p.style.bottom = "0px";
    p.style.animationDuration = (5 + Math.random() * 3) + "s";

    document.body.appendChild(p);
    setTimeout(() => p.remove(), 8000);
}
setInterval(part, 120);

</script>

</body>
</html>
