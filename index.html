<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores Amarillas 💛</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial;
    background: linear-gradient(#87CEEB, #ffffff);
    text-align: center;
}

/* BOTÓN */
#inicio {
    position: absolute;
    top: 40%;
    width: 100%;
}

button {
    padding: 15px 30px;
    font-size: 22px;
    background: gold;
    border: none;
    border-radius: 10px;
    cursor: pointer;
}

/* MENSAJE */
#mensaje {
    display: none;
    position: absolute;
    top: 20%;
    width: 80%;
    left: 10%;
    font-size: 20px;
}

/* TEXTO FINAL */
#final {
    display: none;
    position: absolute;
    top: 5%;
    width: 100%;
    font-size: 35px;
    color: orange;
    font-weight: bold;
    animation: aparecer 3s ease;
}

@keyframes aparecer {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* CONTENEDOR FLORES */
#flores {
    position: absolute;
    bottom: 0;
    width: 100%;
}

/* TALLO */
.tallo {
    position: absolute;
    bottom: 0;
    width: 6px;
    height: 0;
    background: green;
    animation: crecer 3s forwards;
}

@keyframes crecer {
    to { height: 150px; }
}

/* FLOR */
.flor {
    position: absolute;
    bottom: 150px;
    width: 40px;
    height: 40px;
    background: yellow;
    border-radius: 50%;
    transform: scale(0);
    animation: abrir 2s forwards;
    animation-delay: 3s;
}

/* pétalos */
.flor::before, .flor::after {
    content: "";
    position: absolute;
    width: 40px;
    height: 40px;
    background: yellow;
    border-radius: 50%;
}

.flor::before {
    top: -20px;
    left: 0;
}

.flor::after {
    top: 0;
    left: -20px;
}

@keyframes abrir {
    to { transform: scale(1); }
}

/* ABEJAS */
.abeja {
    position: absolute;
    font-size: 25px;
    animation: volar 8s linear infinite;
}

@keyframes volar {
    0% { left: -50px; top: 50px; }
    50% { top: 120px; }
    100% { left: 100%; top: 60px; }
}
</style>
</head>

<body>

<div id="inicio">
    <button onclick="iniciar()">Dale click 💛</button>
</div>

<div id="mensaje"></div>
<div id="final">🌼 Feliz día de las flores amarillas 🌼</div>
<div id="flores"></div>

<script>
function iniciar() {
    document.getElementById("inicio").style.display = "none";

    const texto = `Sé que tal vez no es lo mismo, pero está hecho con mucho amor.
He llegado a decepcionarte y no es mi intención.
Quiero darte lo mejor de mí, que cada día sea especial.
Sé que unas flores virtuales no son lo mismo que unas reales,
pero esta animación está hecha con amor sincero.
Te amo mucho 💛`;

    let mensaje = document.getElementById("mensaje");
    mensaje.style.display = "block";
    mensaje.innerText = texto;

    setTimeout(() => {
        mensaje.style.display = "none";
        mostrarFlores();
    }, 10000);
}

function mostrarFlores() {
    document.getElementById("final").style.display = "block";

    let contenedor = document.getElementById("flores");

    for (let i = 0; i < 8; i++) {
        let x = Math.random() * 90;

        let tallo = document.createElement("div");
        tallo.className = "tallo";
        tallo.style.left = x + "%";

        let flor = document.createElement("div");
        flor.className = "flor";
        flor.style.left = x + "%";

        contenedor.appendChild(tallo);
        contenedor.appendChild(flor);
    }

    // abejas
    for (let i = 0; i < 4; i++) {
        let abeja = document.createElement("div");
        abeja.className = "abeja";
        abeja.innerText = "🐝";
        abeja.style.top = (50 + i * 40) + "px";
        document.body.appendChild(abeja);
    }
}
</script>

</body>
</html>
