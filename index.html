<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores para ti 💛</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #140028, #000);
    overflow: hidden;
    font-family: Arial;
}

h1 {
    text-align: center;
    color: #ffeb3b;
    margin-top: 30px;
    text-shadow: 0 0 20px #ffeb3b, 0 0 40px #ffc107;
}

#campo {
    position: absolute;
    bottom: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 20px;
}
</style>
</head>

<body>

<h1>🌻 Flores para ti 💛</h1>
<div id="campo"></div>

<script>
const campo = document.getElementById("campo");

function crearFlor(escala, curva) {

    let svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("width", 120 * escala);
    svg.setAttribute("height", 220 * escala);

    // 🔥 DEGRADADO (ÚNICO POR FLOR)
    let defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");

    let grad = document.createElementNS("http://www.w3.org/2000/svg", "radialGradient");
    let gradId = "grad" + Math.random();
    grad.setAttribute("id", gradId);

    let stop1 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
    stop1.setAttribute("offset", "0%");
    stop1.setAttribute("stop-color", "#fff9c4");

    let stop2 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
    stop2.setAttribute("offset", "100%");
    stop2.setAttribute("stop-color", "#fbc02d");

    grad.appendChild(stop1);
    grad.appendChild(stop2);
    defs.appendChild(grad);
    svg.appendChild(defs);

    // 🌱 TALLO CURVO
    let tallo = document.createElementNS("http://www.w3.org/2000/svg", "path");
    tallo.setAttribute("d", `M60 220 Q${60 + curva} 140 60 110`);
    tallo.setAttribute("stroke", "#2e7d32");
    tallo.setAttribute("stroke-width", 5 * escala);
    tallo.setAttribute("fill", "none");

    svg.appendChild(tallo);

    // 🍃 HOJAS
    function hoja(x, y, rot) {
        let h = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
        h.setAttribute("cx", x);
        h.setAttribute("cy", y);
        h.setAttribute("rx", 12 * escala);
        h.setAttribute("ry", 6 * escala);
        h.setAttribute("fill", "#388e3c");
        h.setAttribute("transform", `rotate(${rot} ${x} ${y})`);
        return h;
    }

    svg.appendChild(hoja(45, 170, -30));
    svg.appendChild(hoja(75, 150, 30));

    // 🌻 PÉTALOS CON DEGRADADO REAL
    for (let i = 0; i < 18; i++) {
        let petalo = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");

        petalo.setAttribute("cx", "60");
        petalo.setAttribute("cy", "90");
        petalo.setAttribute("rx", 10 * escala);
        petalo.setAttribute("ry", 30 * escala);
        petalo.setAttribute("fill", `url(#${gradId})`);

        petalo.setAttribute("transform", `rotate(${i * 20} 60 120)`);

        svg.appendChild(petalo);
    }

    // 🌻 CENTRO
    let centro = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    centro.setAttribute("cx", "60");
    centro.setAttribute("cy", "120");
    centro.setAttribute("r", 18 * escala);
    centro.setAttribute("fill", "#5d4037");

    svg.appendChild(centro);

    campo.appendChild(svg);
}

// 🌼 RAMO EN PIRÁMIDE (TAMAÑOS DIFERENTES)
crearFlor(0.8, -20);
crearFlor(1, -10);
crearFlor(1.3, 0);   // 🌻 centro grande
crearFlor(1, 10);
crearFlor(0.8, 20);

</script>

</body>
</html>
