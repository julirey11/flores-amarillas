<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores Amarillas 💛</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: linear-gradient(#a8e6ff, #ffffff);
    font-family: 'Segoe UI', sans-serif;
}

/* TEXTO */
#final {
    position: absolute;
    top: 5%;
    width: 100%;
    text-align: center;
    font-size: 35px;
    color: #ff9800;
    opacity: 0;
    animation: fadeIn 3s forwards;
    animation-delay: 6s;
}

@keyframes fadeIn {
    to { opacity: 1; }
}

/* CONTENEDOR */
#campo {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 100%;
}

/* TALLO */
.tallo {
    position: absolute;
    bottom: 0;
    width: 4px;
    height: 0;
    background: #2e7d32;
    animation: crecer 4s ease forwards;
}

@keyframes crecer {
    to { height: 180px; }
}

/* FLOR BASE */
.flor {
    position: absolute;
    transform: scale(0);
    animation: abrir 2s ease forwards;
    animation-delay: 4s;
}

@keyframes abrir {
    to { transform: scale(1); }
}

/* GIRASOL */
.girasol {
    width: 60px;
    height: 60px;
    background: radial-gradient(circle, #5d4037 30%, #fdd835 31%);
    border-radius: 50%;
}

/* pétalos girasol */
.girasol::before {
    content: "";
    position: absolute;
    width: 80px;
    height: 80px;
    background: repeating-conic-gradient(#fdd835 0deg 20deg, transparent 20deg 40deg);
    border-radius: 50%;
    top: -10px;
    left: -10px;
}

/* ROSA */
.rosa {
    width: 50px;
    height: 50px;
    background: radial-gradient(circle, #ffeb3b, #fbc02d);
    border-radius: 50%;
    box-shadow: inset 0 0 10px #f57f17;
}

/* TULIPÁN */
.tulipan {
    width: 30px;
    height: 50px;
    background: #fdd835;
    border-radius: 50% 50% 0 0;
}

/* ABEJAS */
.abeja {
    position: absolute;
    width: 20px;
    height: 20px;
    background: black;
    border-radius: 50%;
    animation: volar 10s linear infinite;
}

@keyframes volar {
    0% { left: -50px; top: 50px; }
    50% { top: 120px; }
    100% { left: 100%; top: 60px; }
}
</style>
</head>

<body>

<div id="final">🌼 Feliz día de las flores amarillas 🌼</div>
<div id="campo"></div>

<script>
function crearFlor(tipo, x) {
    let campo = document.getElementById("campo");

    let tallo = document.createElement("div");
    tallo.className = "tallo";
    tallo.style.left = x + "%";

    let flor = document.createElement("div");
    flor.className = "flor " + tipo;
    flor.style.left = (x - 2) + "%";
    flor.style.bottom = "180px";

    campo.appendChild(tallo);
    campo.appendChild(flor);
}

// Crear flores distribuidas
let tipos = ["girasol", "rosa", "tulipan"];

for (let i = 0; i < 10; i++) {
    let tipo = tipos[Math.floor(Math.random() * tipos.length)];
    let x = Math.random() * 90;
    crearFlor(tipo, x);
}

// Abejas
for (let i = 0; i < 3; i++) {
    let abeja = document.createElement("div");
    abeja.className = "abeja";
    abeja.style.top = (50 + i * 40) + "px";
    document.body.appendChild(abeja);
}
</script>

</body>
</html>
