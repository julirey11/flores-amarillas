<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores para ti 💛</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #140028, #000);
    overflow: hidden;
    font-family: Arial;
}

/* TEXTO */
h1 {
    text-align: center;
    color: #ffeb3b;
    margin-top: 30px;
    text-shadow: 0 0 20px #ffeb3b, 0 0 40px #ffc107;
}

/* CAMPO */
#campo {
    position: absolute;
    bottom: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 40px;
}

/* TALLO */
.tallo {
    width: 6px;
    height: 0;
    background: #2e7d32;
    animation: crecer 3s ease forwards;
}

@keyframes crecer {
    to { height: 160px; }
}

/* FLOR */
.flor {
    transform: scale(0);
    animation: abrir 2s ease forwards;
    animation-delay: 3s;
}

@keyframes abrir {
    to { transform: scale(1); }
}

/* BRILLOS */
.brillo {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #ffeb3b;
    border-radius: 50%;
    animation: flotar 6s linear infinite;
}

@keyframes flotar {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-300px); opacity: 0; }
}
</style>
</head>

<body>

<h1>🌻 Flores para ti 💛</h1>

<div id="campo"></div>

<script>
const campo = document.getElementById("campo");

function crearGirasol() {
    let cont = document.createElement("div");
    cont.style.display = "flex";
    cont.style.flexDirection = "column";
    cont.style.alignItems = "center";

    // SVG
    let svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("width", "90");
    svg.setAttribute("height", "90");
    svg.classList.add("flor");

    // pétalos (suaves y redondos)
    for (let i = 0; i < 16; i++) {
        let petalo = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
        petalo.setAttribute("cx", "45");
        petalo.setAttribute("cy", "20");
        petalo.setAttribute("rx", "10");
        petalo.setAttribute("ry", "25");
        petalo.setAttribute("fill", "#fdd835");
        petalo.setAttribute("transform", `rotate(${i * 22.5} 45 45)`);
        svg.appendChild(petalo);
    }

    // centro
    let centro = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    centro.setAttribute("cx", "45");
    centro.setAttribute("cy", "45");
    centro.setAttribute("r", "15");
    centro.setAttribute("fill", "#5d4037");

    svg.appendChild(centro);

    // tallo
    let tallo = document.createElement("div");
    tallo.className = "tallo";

    cont.appendChild(svg);
    cont.appendChild(tallo);

    campo.appendChild(cont);
}

// crear varias flores
for (let i = 0; i < 6; i++) {
    crearGirasol();
}

// brillos
function crearBrillo() {
    let b = document.createElement("div");
    b.className = "brillo";
    b.style.left = Math.random() * 100 + "%";
    b.style.top = "100%";

    document.body.appendChild(b);
    setTimeout(() => b.remove(), 6000);
}

setInterval(crearBrillo, 150);
</script>

</body>
</html>
