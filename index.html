<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores para ti 💛</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #140028, #000);
    overflow: hidden;
    font-family: Arial;
    text-align: center;
}

h1 {
    color: #ffeb3b;
    margin-top: 20px;
    text-shadow: 0 0 20px #ffeb3b;
}

/* BOTÓN */
button {
    margin-top: 20px;
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #ffeb3b;
    cursor: pointer;
}

/* CAMPO */
#campo {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 70%;
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 20px;
}

/* TALLO */
.tallo {
    stroke-dasharray: 300;
    stroke-dashoffset: 300;
    animation: crecer 3s ease forwards;
}

@keyframes crecer {
    to { stroke-dashoffset: 0; }
}

/* FLOR */
.flor {
    opacity: 0;
    transform: scale(0.5);
    animation: florecer 2s ease forwards;
    animation-delay: 2.5s;
}

@keyframes florecer {
    to {
        opacity: 1;
        transform: scale(1);
    }
}

/* HOJAS */
.hoja {
    opacity: 0;
    animation: hojas 1s ease forwards;
    animation-delay: 2s;
}

@keyframes hojas {
    to { opacity: 1; }
}

/* PARTÍCULAS */
.particula {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #ffeb3b;
    border-radius: 50%;
    animation: flotar linear infinite;
}

@keyframes flotar {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-400px); opacity: 0; }
}
</style>
</head>

<body>

<h1>🌻 Flores para ti 💛</h1>
<button onclick="crearRamo()">Dale click 💛</button>

<div id="campo"></div>

<script>
const campo = document.getElementById("campo");

function crearFlor(escala, curva, offsetX) {

    let svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("width", 140);
    svg.setAttribute("height", 260);
    svg.style.transform = `translateX(${offsetX}px) scale(${escala})`;

    // DEGRADADO
    let defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");

    let grad = document.createElementNS("http://www.w3.org/2000/svg", "radialGradient");
    let id = "g" + Math.random();

    grad.setAttribute("id", id);
    grad.innerHTML = `
        <stop offset="0%" stop-color="#fff9c4"/>
        <stop offset="100%" stop-color="#fbc02d"/>
    `;

    defs.appendChild(grad);
    svg.appendChild(defs);

    // TALLO CURVO
    let tallo = document.createElementNS("http://www.w3.org/2000/svg", "path");
    tallo.setAttribute("d", `M70 260 Q${70 + curva} 150 70 120`);
    tallo.setAttribute("stroke", "#2e7d32");
    tallo.setAttribute("stroke-width", 6);
    tallo.setAttribute("fill", "none");
    tallo.classList.add("tallo");

    svg.appendChild(tallo);

    // HOJAS GRANDES (visibles)
    function hoja(x, y, rot) {
        let h = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
        h.setAttribute("cx", x);
        h.setAttribute("cy", y);
        h.setAttribute("rx", 16);
        h.setAttribute("ry", 8);
        h.setAttribute("fill", "#43a047");
        h.setAttribute("transform", `rotate(${rot} ${x} ${y})`);
        h.classList.add("hoja");
        return h;
    }

    svg.appendChild(hoja(55, 200, -40));
    svg.appendChild(hoja(85, 180, 40));

    // FLOR
    let grupo = document.createElementNS("http://www.w3.org/2000/svg", "g");
    grupo.classList.add("flor");

    for (let i = 0; i < 20; i++) {
        let petalo = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");

        petalo.setAttribute("cx", "70");
        petalo.setAttribute("cy", "100");
        petalo.setAttribute("rx", 12);
        petalo.setAttribute("ry", 32);
        petalo.setAttribute("fill", `url(#${id})`);

        petalo.setAttribute("transform", `rotate(${i * 18} 70 120)`);
        grupo.appendChild(petalo);
    }

    let centro = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    centro.setAttribute("cx", "70");
    centro.setAttribute("cy", "120");
    centro.setAttribute("r", 20);
    centro.setAttribute("fill", "#5d4037");

    grupo.appendChild(centro);
    svg.appendChild(grupo);

    campo.appendChild(svg);
}

function crearRamo() {
    campo.innerHTML = "";

    crearFlor(0.7, -30, -80);
    crearFlor(0.9, -15, -40);
    crearFlor(1.2, 0, 0);      // centro
    crearFlor(0.9, 15, 40);
    crearFlor(0.7, 30, 80);
}

// PARTÍCULAS
function part() {
    let p = document.createElement("div");
    p.className = "particula";
    p.style.left = Math.random() * 100 + "%";
    p.style.bottom = "0px";
    p.style.animationDuration = (4 + Math.random() * 3) + "s";

    document.body.appendChild(p);
    setTimeout(() => p.remove(), 7000);
}
setInterval(part, 150);

</script>

</body>
</html>
