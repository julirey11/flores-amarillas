<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores para ti 💛</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #140028, #000);
    overflow: hidden;
    font-family: Arial;
}

/* TEXTO */
h1 {
    text-align: center;
    color: #ffeb3b;
    margin-top: 30px;
    text-shadow: 0 0 20px #ffeb3b, 0 0 40px #ffc107;
}

/* CAMPO */
#campo {
    position: absolute;
    bottom: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 40px;
}
</style>
</head>

<body>

<h1>🌻 Flores para ti 💛</h1>
<div id="campo"></div>

<script>
const campo = document.getElementById("campo");

function crearFlor() {
    let cont = document.createElement("div");

    // SVG completo
    let svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
    svg.setAttribute("width", "120");
    svg.setAttribute("height", "220");

    // DEFINIR DEGRADADO
    let defs = document.createElementNS("http://www.w3.org/2000/svg", "defs");

    let grad = document.createElementNS("http://www.w3.org/2000/svg", "radialGradient");
    grad.setAttribute("id", "gradPetalo");

    let stop1 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
    stop1.setAttribute("offset", "0%");
    stop1.setAttribute("stop-color", "#fff176");

    let stop2 = document.createElementNS("http://www.w3.org/2000/svg", "stop");
    stop2.setAttribute("offset", "100%");
    stop2.setAttribute("stop-color", "#fbc02d");

    grad.appendChild(stop1);
    grad.appendChild(stop2);
    defs.appendChild(grad);
    svg.appendChild(defs);

    // TALLO CURVO
    let tallo = document.createElementNS("http://www.w3.org/2000/svg", "path");
    tallo.setAttribute("d", "M60 220 Q50 150 60 120");
    tallo.setAttribute("stroke", "#2e7d32");
    tallo.setAttribute("stroke-width", "5");
    tallo.setAttribute("fill", "none");

    svg.appendChild(tallo);

    // HOJAS
    function crearHoja(x, y, rot) {
        let hoja = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");
        hoja.setAttribute("cx", x);
        hoja.setAttribute("cy", y);
        hoja.setAttribute("rx", "12");
        hoja.setAttribute("ry", "6");
        hoja.setAttribute("fill", "#388e3c");
        hoja.setAttribute("transform", `rotate(${rot} ${x} ${y})`);
        return hoja;
    }

    svg.appendChild(crearHoja(50, 170, -30));
    svg.appendChild(crearHoja(70, 150, 30));

    // PÉTALOS CON DEGRADADO
    for (let i = 0; i < 18; i++) {
        let petalo = document.createElementNS("http://www.w3.org/2000/svg", "ellipse");

        petalo.setAttribute("cx", "60");
        petalo.setAttribute("cy", "90");
        petalo.setAttribute("rx", "10");
        petalo.setAttribute("ry", "30");
        petalo.setAttribute("fill", "url(#gradPetalo)");

        petalo.setAttribute(
            "transform",
            `rotate(${i * 20} 60 120)`
        );

        svg.appendChild(petalo);
    }

    // CENTRO
    let centro = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    centro.setAttribute("cx", "60");
    centro.setAttribute("cy", "120");
    centro.setAttribute("r", "18");
    centro.setAttribute("fill", "#5d4037");

    svg.appendChild(centro);

    campo.appendChild(svg);
}

// crear varias flores
for (let i = 0; i < 6; i++) {
    crearFlor();
}
</script>

</body>
</html>
