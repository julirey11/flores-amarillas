<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores para ti 💛</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle, #1a0033, #000);
    overflow: hidden;
    font-family: Arial;
    color: white;
}

/* TEXTO */
h1 {
    text-align: center;
    margin-top: 40px;
    color: #ffeb3b;
    text-shadow: 0 0 20px #ffeb3b, 0 0 40px #ffc107;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #ffeb3b; }
    to { text-shadow: 0 0 30px #ffc107; }
}

/* FLORES */
#flores {
    position: absolute;
    bottom: 0;
    width: 100%;
    display: flex;
    justify-content: center;
    gap: 20px;
}

/* GIRASOL */
.girasol {
    width: 80px;
    height: 80px;
    background: radial-gradient(circle, #4e342e 30%, #fdd835 31%);
    border-radius: 50%;
    position: relative;
    animation: aparecer 3s ease forwards;
}

/* pétalos */
.girasol::before {
    content: "";
    position: absolute;
    width: 110px;
    height: 110px;
    background: repeating-conic-gradient(#fdd835 0deg 15deg, transparent 15deg 30deg);
    border-radius: 50%;
    top: -15px;
    left: -15px;
}

/* TALLO */
.tallo {
    width: 6px;
    height: 100px;
    background: green;
    margin: auto;
}

/* APARECER */
@keyframes aparecer {
    from { transform: translateY(200px) scale(0); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
}

/* BRILLOS */
.brillo {
    position: absolute;
    width: 5px;
    height: 5px;
    background: yellow;
    border-radius: 50%;
    animation: flotar 5s linear infinite;
}

@keyframes flotar {
    from { transform: translateY(0); opacity: 1; }
    to { transform: translateY(-200px); opacity: 0; }
}
</style>
</head>

<body>

<h1>🌻 Flores para ti 💛</h1>

<div id="flores"></div>

<script>
// crear flores
let cont = document.getElementById("flores");

for (let i = 0; i < 7; i++) {
    let contenedor = document.createElement("div");

    let flor = document.createElement("div");
    flor.className = "girasol";

    let tallo = document.createElement("div");
    tallo.className = "tallo";

    contenedor.appendChild(flor);
    contenedor.appendChild(tallo);

    cont.appendChild(contenedor);
}

// crear brillos
function crearBrillo() {
    let b = document.createElement("div");
    b.className = "brillo";
    b.style.left = Math.random() * 100 + "%";
    b.style.top = "100%";

    document.body.appendChild(b);

    setTimeout(() => b.remove(), 5000);
}

setInterval(crearBrillo, 200);
</script>

</body>
</html>
